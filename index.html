<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BEAL AR Video İndeksi</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
        .container { max-width: 500px; margin: auto; background: #262626; padding: 30px; border-radius: 15px; border-bottom: 5px solid #800000; }
        h1 { color: #800000; font-size: 24px; }
        .info { font-size: 0.8em; color: #aaa; margin-bottom: 20px; }
        
        /* GERÇEK TUŞ STİLİ */
        .play-button {
            display: block; width: 100%; padding: 20px; margin: 15px 0;
            background: #800000; color: white; border: none;
            border-radius: 10px; font-size: 18px; font-weight: bold;
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .play-button:hover { background: #a00000; transform: translateY(-3-px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .play-button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <h1>RUN OUT OF INDEX</h1>
    <p class="info">TÜBİTAK 4006 | Phrasal-Filmer AR Projesi</p>

    <!-- href kısmına video dosyasının adını tam olarak yazın -->
    <a href="run_out_battery.mp4" target="_blank" class="play-button">01 - Run out of Battery</a>
    <a href="run_out_milk.mp4" target="_blank" class="play-button">02 - Run out of Milk</a>
    <a href="run_out_time.mp4" target="_blank" class="play-button">03 - Run out of Time</a>

    <p style="margin-top:20px; font-size: 12px; color: #666;">
        Not: Tuşa basınca video yeni sekmede açılır. Açılmıyorsa dosya ismini kontrol edin.
    </p>
</div>

</body>
</html>
