<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHRASAL-FILMER | AR LIBRARY</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 20px; border: 2px solid #800000; box-shadow: 0 0 20px rgba(128,0,0,0.5); }
        h2 { text-align: center; color: #800000; letter-spacing: 2px; margin-top: 0; }
        .v-container { width: 100%; height: 220px; background: #000; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { width: 100%; padding: 14px; margin: 6px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #800000; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    <div class="v-container">
        <!-- Başlangıçta boş, butona basınca dolar -->
        <iframe id="vid" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- YouTube Linklerinizi Alttaki v('...') İçine Yapıştırın -->
    <button class="btn" onclick="v('https://www.youtube.com/watch?v=VIDEO_ID_1')">01 - Run out of Battery ▶</button>
    <button class="btn" onclick="v('https://www.youtube.com/watch?v=VIDEO_ID_2')">02 - Run out of Milk ▶</button>
    <button class="btn" onclick="v('https://www.youtube.com/watch?v=VIDEO_ID_3')">03 - Run out of Patience ▶</button>
    <button class="btn" onclick="v('https://www.youtube.com/watch?v=VIDEO_ID_4')">04 - Run out of Time ▶</button>
</div>

<script>
    function v(url) {
        const p = document.getElementById('vid');
        // YouTube linkini gömme formatına çevirir
        let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        p.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    }
</script>

</body>
</html>
