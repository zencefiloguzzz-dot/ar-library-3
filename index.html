<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAL AR | Phrasal-Filmer</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 6px solid #800000; }
        h2 { text-align: center; color: #800000; margin-bottom: 20px; }
        .video-box { width: 100%; height: 250px; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .btn:hover { background: #800000; }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    <div class="video-box">
        <iframe id="yt-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- YouTube Linklerini ' ' arasına yapıştırın -->
    <button class="btn" onclick="vAc('LİNK_BURAYA_1')">01 - Battery (Şarj) <span>▶</span></button>
    <button class="btn" onclick="vAc('LİNK_BURAYA_2')">02 - Milk (Süt) <span>▶</span></button>
    <button class="btn" onclick="vAc('LİNK_BURAYA_3')">03 - Patience (Sabır) <span>▶</span></button>
    <button class="btn" onclick="vAc('LİNK_BURAYA_4')">04 - Time (Zaman) <span>▶</span></button>
</div>

<script>
    function vAc(link) {
        const p = document.getElementById('yt-player');
        // Linki YouTube embed formatına çevirir
        let id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
        p.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    }
</script>

</body>
</html>
