<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PHRASAL-FILMER | BEAL AR INDEX</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 30px; }
        .card { width: 450px; background: #1e1e1e; padding: 25px; border-radius: 15px; border-top: 6px solid #800000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h2 { text-align: center; color: #800000; margin-bottom: 20px; }
        
        .video-box { width: 100%; height: 260px; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; position: relative; }
        video { width: 100%; height: 100%; display: none; object-fit: contain; }
        iframe { width: 100%; height: 100%; display: none; border: none; } /* YouTube için */

        .btn { 
            width: 100%; padding: 15px; margin: 8px 0; background: #2a2a2a; color: #fff; 
            border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold;
            display: flex; justify-content: space-between; transition: 0.3s;
        }
        .btn:hover { background: #800000; border-color: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    
    <div class="video-box">
        <!-- Video burada oynayacak -->
        <video id="v-player" controls autoplay></video>
        <!-- YouTube burada oynayacak -->
        <iframe id="yt-player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- BURADAKİ LİNKLERİ YOUTUBE LİNKLERİYLE DEĞİŞTİREBİLİRSİNİZ -->
    <button class="btn" onclick="videoAc('YOUTUBE_LINKI_1')">01 - Run out of Battery <span>▶</span></button>
    <button class="btn" onclick="videoAc('YOUTUBE_LINKI_2')">02 - Run out of Milk <span>▶</span></button>
    <button class="btn" onclick="videoAc('YOUTUBE_LINKI_3')">03 - Run out of Patience <span>▶</span></button>
    <button class="btn" onclick="videoAc('YOUTUBE_LINKI_4')">04 - Run out of Time <span>▶</span></button>
</div>

<script>
    function videoAc(link) {
        const vPlayer = document.getElementById('v-player');
        const ytPlayer = document.getElementById('yt-player');

        if (link.includes('youtube.com') || link.includes('youtu.be')) {
            // YouTube linki gelirse iframe'i göster
            let embedUrl = link.replace("watch?v=", "embed/");
            ytPlayer.src = embedUrl + "?autoplay=1";
            ytPlayer.style.display = "block";
            vPlayer.style.display = "none";
            vPlayer.pause();
        } else {
            // Normal MP4 dosyası gelirse video player'ı göster
            vPlayer.src = link;
            vPlayer.style.display = "block";
            ytPlayer.style.display = "none";
            ytPlayer.src = "";
            vPlayer.play().catch(e => {
                alert("İnternet üzerinden yerel dosyaya ulaşılamıyor. Lütfen YouTube linki kullanın.");
            });
        }
    }
</script>

</body>
</html>
