<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrasal-Filmer | Video Player</title>
    <style>
        :root {
            --beal-maroon: #800000;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h1 { text-align: center; color: var(--beal-maroon); margin-bottom: 20px; }

        /* Buton Stilleri */
        .video-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .video-btn:hover {
            background: var(--beal-maroon);
            transform: scale(1.02);
        }

        /* Video Modal (Gizli Pencere) */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            position: relative;
            margin: auto;
            top: 10%;
            width: 80%;
            max-width: 800px;
        }

        video { width: 100%; border-radius: 10px; box-shadow: 0 0 20px var(--beal-maroon); }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RUN OUT OF INDEX</h1>
    
    <!-- data-src kısmına video dosyanızın adını yazın -->
    <button class="video-btn" onclick="openVideo('video1.mp4')">
        <span>01 - Run out of Battery</span>
        <span>▶</span>
    </button>

    <button class="video-btn" onclick="openVideo('video2.mp4')">
        <span>02 - Run out of Milk</span>
        <span>▶</span>
    </button>

    <button class="video-btn" onclick="openVideo('video3.mp4')">
        <span>03 - Run out of Patience</span>
        <span>▶</span>
    </button>
</div>

<!-- Video Oynatıcı Penceresi -->
<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeVideo()">&times; Kapat</span>
        <video id="mainVideo" controls>
            <source src="" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>
    </div>
</div>

<script>
    const modal = document.getElementById('videoModal');
    const video = document.getElementById('mainVideo');

    function openVideo(videoSrc) {
        video.src = videoSrc; // Videonun yolunu ayarlar
        modal.style.display = "block"; // Pencereyi açar
        video.play(); // Videoyu başlatır
    }

    function closeVideo() {
        modal.style.display = "none"; // Pencereyi kapatır
        video.pause(); // Videoyu durdurur
        video.src = ""; // Kaynağı temizler
    }

    // Pencere dışına tıklayınca kapatma
    window.onclick = function(event) {
        if (event.target == modal) { closeVideo(); }
    }
</script>

</body>
</html>
