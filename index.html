<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAL Phrasal-Filmer AR</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 5px solid #800000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #800000; margin-bottom: 20px; }
        .video-box { width: 100%; height: 230px; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { width: 100%; padding: 14px; margin: 6px 0; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .btn:hover { background: #800000; }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    <div class="video-box">
        <iframe id="vid" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- YouTube linklerinizi buradaki tırnakların içine koyun -->
    <button class="btn" onclick="v('YOUTUBE_LINK_1')">01 - Battery (Şarj) <span>▶</span></button>
    <button class="btn" onclick="v('YOUTUBE_LINK_2')">02 - Milk (Süt) <span>▶</span></button>
    <button class="btn" onclick="v('YOUTUBE_LINK_3')">03 - Patience (Sabır) <span>▶</span></button>
    <button class="btn" onclick="v('YOUTUBE_LINK_4')">04 - Time (Zaman) <span>▶</span></button>
</div>

<script>
    function v(url) {
        const p = document.getElementById('vid');
        // YouTube ID'sini çeker
        let id = "";
        if(url.includes('v=')) {
            id = url.split('v=')[1].split('&')[0];
        } else {
            id = url.split('/').pop();
        }
        p.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    }
</script>

</body>
</html>
