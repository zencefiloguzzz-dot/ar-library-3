<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BEAL | Phrasal-Filmer Video Index</title>
    <style>
        :root { --beal: #800000; --bg: #121212; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .list-container { width: 400px; background: #1e1e1e; padding: 20px; border-radius: 10px; border-top: 5px solid var(--beal); }
        .btn { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: #2a2a2a; border: 1px solid #444; 
            color: white; cursor: pointer; text-align: left;
            border-radius: 5px; transition: 0.2s;
        }
        .btn:hover { background: var(--beal); border-color: white; }
        
        /* Video Penceresi */
        #videoOverlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            flex-direction: column; justify-content: center; align-items: center;
        }
        video { width: 80%; max-width: 900px; border: 2px solid var(--beal); }
        .close-btn { color: white; margin-bottom: 15px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="list-container">
    <h2 style="text-align: center;">RUN OUT OF INDEX</h2>
    
    <!-- DİKKAT: 'video1.mp4' yazan yere videonuzun tam adını yazın -->
    <button class="btn" onclick="playARVideo('run_out_battery.mp4')">01 - Run out of Battery ▶</button>
    <button class="btn" onclick="playARVideo('run_out_milk.mp4')">02 - Run out of Milk ▶</button>
    <button class="btn" onclick="playARVideo('run_out_time.mp4')">03 - Run out of Time ▶</button>
</div>

<div id="videoOverlay">
    <div class="close-btn" onclick="closeARVideo()">✖ KAPAT (ESC)</div>
    <video id="player" controls>
        <source id="videoSource" src="" type="video/mp4">
    </video>
</div>

<script>
    const overlay = document.getElementById('videoOverlay');
    const player = document.getElementById('player');
    const source = document.getElementById('videoSource');

    function playARVideo(file) {
        // 1. Önce kaynağı güncelle
        source.src = file;
        
        // 2. Videoyu yükle
        player.load();
        
        // 3. Pencereyi göster
        overlay.style.display = 'flex';
        
        // 4. Oynatmayı dene ve hata kontrolü yap
        player.play().catch(error => {
            alert("Hata: '" + file + "' dosyası bulunamadı! \n\nLütfen video dosyasının bu HTML ile AYNI KLASÖRDE olduğundan ve isminin doğru olduğundan emin olun.");
            closeARVideo();
        });
    }

    function closeARVideo() {
        overlay.style.display = 'none';
        player.pause();
    }

    // ESC tuşu ile kapatma özelliği
    document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeARVideo(); });
</script>

</body>
</html>
