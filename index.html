<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phrasal-Filmer | Interactive Index</title>
    <style>
        :root {
            --beal-maroon: #800000;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #ffd700; /* Altın sarısı vurgu */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-top: 4px solid var(--beal-maroon);
        }

        h1 {
            text-align: center;
            color: var(--beal-maroon);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        /* Tıklanabilir Buton Stili */
        .index-button {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            width: 100%;
            text-align: left;
            color: var(--text-color);
            transition: all 0.3s ease;
            outline: none;
        }

        .index-button:hover {
            background: var(--beal-maroon);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-color: var(--accent-color);
        }

        .index-button:active {
            transform: scale(0.98);
        }

        .id {
            font-weight: bold;
            font-size: 1.4em;
            color: var(--accent-color);
            margin-right: 20px;
            width: 40px;
        }

        .content {
            flex-grow: 1;
        }

        .content strong {
            display: block;
            font-size: 1.1em;
        }

        .content span {
            font-size: 0.85em;
            opacity: 0.7;
        }

        /* Bildirim Kutusu */
        #status-box {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>RUN OUT OF</h1>
    <p class="subtitle">Phrasal-Filmer AR Content Library</p>
    
    <!-- Buton 1 -->
    <button class="index-button" onclick="playVideo('Battery Video Açılıyor...')">
        <div class="id">01</div>
        <div class="content">
            <strong>Run out of Battery</strong>
            <span>Mask Tracking & UI Elements</span>
        </div>
    </button>

    <!-- Buton 2 -->
    <button class="index-button" onclick="playVideo('Milk Video Açılıyor...')">
        <div class="id">02</div>
        <div class="content">
            <strong>Run out of Milk</strong>
            <span>Lumetri Color Grading</span>
        </div>
    </button>

    <!-- Buton 3 -->
    <button class="index-button" onclick="playVideo('Patience Video Açılıyor...')">
        <div class="id">03</div>
        <div class="content">
            <strong>Run out of Patience</strong>
            <span>Roto Brush 3.0 Integration</span>
        </div>
    </button>

    <!-- Buton 4 -->
    <button class="index-button" onclick="playVideo('Time Video Açılıyor...')">
        <div class="id">04</div>
        <div class="content">
            <strong>Run out of Time</strong>
            <span>After Effects Time Remapping[cite: 1]</span>
        </div>
    </button>

    <div id="status-box"></div>
</div>

<script>
    function playVideo(message) {
        const box = document.getElementById('status-box');
        box.style.display = 'block';
        box.style.backgroundColor = '#4caf50';
        box.innerText = message;
        
        // Buraya ileride video linki ekleyebilirsiniz:
        // window.location.href = "video_adresi.mp4";
        
        setTimeout(() => {
            box.style.display = 'none';
        }, 2000);
    }
</script>

</body>
</html>
