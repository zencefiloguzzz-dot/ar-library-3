<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PHRASAL-FILMER | ACİL ÇÖZÜM PANELİ</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 2px solid #800000; }
        video { width: 100%; border-radius: 10px; margin-top: 20px; background: #000; display: block; }
        .btn { 
            width: 100%; padding: 15px; margin: 10px 0; background: #800000; 
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn:hover { background: #b00000; }
        .warning { color: #ffcc00; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>RUN OUT OF INDEX</h2>
    <p class="warning">Not: Video otomatik başlamazsa lütfen dosyayı seçin.</p>
    
    <video id="mainPlayer" controls autoplay></video>

    <hr style="border: 0.5px solid #333; margin: 20px 0;">

    <!-- Dosya yollarını manuel tetikleme -->
    <button class="btn" onclick="videoTetikle('run_out_battery.mp4')">01 - Run out of Battery</button>
    <button class="btn" onclick="videoTetikle('run_out_milk.mp4')">02 - Run out of Milk</button>
    <button class="btn" onclick="videoTetikle('run_out_patience.mp4')">03 - Run out of Patience</button>
    <button class="btn" onclick="videoTetikle('run_out_time.mp4')">04 - Run out of Time[cite: 1]</button>
    
    <!-- Manuel Dosya Seçici (Gizli) -->
    <input type="file" id="fileInput" style="display: none;" accept="video/mp4">
</div>

<script>
    const video = document.getElementById('mainPlayer');
    const fileInput = document.getElementById('fileInput');

    function videoTetikle(dosyaAdi) {
        // Önce doğrudan deniyoruz
        video.src = dosyaAdi;
        video.play().catch(error => {
            console.log("Güvenlik engeli takıldı, manuel seçim açılıyor.");
            // Eğer tarayıcı engellerse, kullanıcıya dosyayı seçtiriyoruz
            alert("Tarayıcı güvenliği nedeniyle lütfen klasörden '" + dosyaAdi + "' dosyasını bir kez seçin.");
            fileInput.click();
        });
    }

    // Dosya seçildiğinde oynat
    fileInput.onchange = e => {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        video.src = url;
        video.play();
    }
</script>

</body>
</html>
