<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAL Phrasal-Filmer AR</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 6px solid #800000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #800000; margin-bottom: 20px; }
        .video-box { width: 100%; height: 230px; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn { width: 100%; padding: 14px; margin: 6px 0; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .btn:hover { background: #800000; }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    <div class="video-box">
        <!-- Video burada oynayacak, asla dışarı taşmayacak -->
        <video id="myVideo" controls playsinline>
            <source id="videoSource" src="roo.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>
    </div>

    <!-- Tırnak içindeki kısımları GitHub'daki dosya adlarınızla değiştirin -->
    <button class="btn" onclick="degistir('roo.mp4')">01 - Battery (Şarj) <span>▶</span></button>
    <button class="btn" onclick="degistir('video2.mp4')">02 - Milk (Süt) <span>▶</span></button>
    <button class="btn" onclick="degistir('video3.mp4')">03 - Patience (Sabır) <span>▶</span></button>
    <button class="btn" onclick="degistir('video4.mp4')">04 - Time (Zaman) <span>▶</span></button>
</div>

<script>
    function degistir(dosyaAdi) {
        var video = document.getElementById('myVideo');
        var source = document.getElementById('videoSource');
        
        source.src = dosyaAdi;
        video.load(); // Yeni videoyu yükle
        video.play(); // Otomatik başlat
    }
</script>

</body>
</html>
