<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BEAL AR | Phrasal-Filmer</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 90%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #800000; text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .video-box { 
            width: 100%; height: 250px; background: #333; margin-bottom: 20px; 
            border-radius: 8px; overflow: hidden; border: 1px solid #444;
            display: flex; justify-content: center; align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .placeholder-text { color: #888; font-style: italic; }

        .btn { 
            width: 100%; padding: 15px; margin: 5px 0; background: #2a2a2a; 
            color: white; border: 1px solid #800000; border-radius: 6px; 
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #800000; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>RUN OUT OF INDEX</h2>
    
    <!-- Video Oynatıcı Alanı -->
    <div class="video-box" id="playerContainer">
        <span class="placeholder-text" id="infoText">Lütfen bir video seçin</span>
        <video id="myVideo" controls>
            <source src="" type="video/mp4">
            Tarayıcınız bu videoyu desteklemiyor.
        </video>
    </div>

    <!-- Butonlar -->
    <button class="btn" onclick="videoOynat('run_out_battery.mp4')">1. Battery (Şarj Bitmesi)</button>
    <button class="btn" onclick="videoOynat('run_out_milk.mp4')">2. Milk (Süt Bitmesi)</button>
    <button class="btn" onclick="videoOynat('run_out_time.mp4')">3. Time (Zamanın Bitmesi)</button>
</div>

<script>
    function videoOynat(dosyaAdi) {
        var video = document.getElementById('myVideo');
        var info = document.getElementById('infoText');
        
        // Gri ekranı kaldır ve videoyu göster
        info.style.display = 'none';
        video.style.display = 'block';
        
        // Videoyu yükle
        video.src = dosyaAdi;
        video.load();
        
        // Oynatmayı dene
        var playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                console.log("Video başarıyla başladı.");
            }).catch(error => {
                // HATA OLURSA BURASI ÇALIŞIR
                alert("HATA: '" + dosyaAdi + "' dosyası açılamadı!\n\nSebepler:\n1. Dosya ismi yanlış olabilir.\n2. Video bu klasörde olmayabilir.\n3. Premiere çıktısı 'H.264' olmayabilir.");
                video.style.display = 'none';
                info.style.display = 'block';
                info.innerText = "Hata: Dosya Bulunamadı";
            });
        }
    }
</script>

</body>
</html>
