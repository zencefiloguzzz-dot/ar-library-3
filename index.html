<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAL AR | Phrasal-Filmer</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 6px solid #800000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #800000; margin-bottom: 20px; }
        .video-box { width: 100%; height: 250px; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; transition: 0.3s; }
        .btn:hover { background: #800000; }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    <div class="video-box">
        <iframe id="yt-player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- YouTube Linklerinizi buradaki tırnakların içine yapıştırın -->
    <button class="btn" onclick="videoAc('LİNK1')">01 - Battery (Şarj) <span>▶</span></button>
    <button class="btn" onclick="videoAc('LİNK2')">02 - Milk (Süt) <span>▶</span></button>
    <button class="btn" onclick="videoAc('LİNK3')">03 - Patience (Sabır) <span>▶</span></button>
    <button class="btn" onclick="videoAc('LİNK4')">04 - Time (Zaman) <span>▶</span></button>
</div>

<script>
    function videoAc(link) {
        const player = document.getElementById('yt-player');
        // Linkten video ID'sini otomatik çeken güvenli fonksiyon
        let videoId = "";
        if(link.includes('v=')) {
            videoId = link.split('v=')[1].split('&')[0];
        } else {
            videoId = link.split('/').pop();
        }
        player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
    }
</script>

</body>
</html>
