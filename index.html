<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PHRASAL-FILMER AR INDEX</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 450px; background: #252525; padding: 25px; border-radius: 15px; border-top: 6px solid #800000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #800000; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* Video Alanı */
        .video-wrapper { width: 100%; background: #000; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #333; height: 250px; position: relative; }
        video { width: 100%; height: 100%; display: none; }
        .msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 0.9em; text-align: center; width: 80%; }

        /* Butonlar */
        .btn { 
            width: 100%; padding: 14px; margin: 8px 0; background: #333; color: white; 
            border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 15px;
            transition: all 0.3s; text-align: left; display: flex; justify-content: space-between;
        }
        .btn:hover { background: #800000; border-color: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>RUN OUT OF</h2>
    
    <div class="video-wrapper">
        <div id="status" class="msg">İzlemek için bir video seçin</div>
        <video id="v-player" controls preload="auto">
            <source src="" type="video/mp4">
        </video>
    </div>

    <!-- ÖNEMLİ: Tırnak içindeki isimleri bilgisayarınızdaki videolarla AYNI yapın -->
    <button class="btn" onclick="oynat('run_out_battery.mp4')">01 - Battery (Şarj) <span>▶</span></button>
    <button class="btn" onclick="oynat('run_out_milk.mp4')">02 - Milk (Süt) <span>▶</span></button>
    <button class="btn" onclick="oynat('run_out_patience.mp4')">03 - Patience (Sabır) <span>▶</span></button>
    <button class="btn" onclick="oynat('run_out_time.mp4')">04 - Time (Zaman) <span>▶</span></button>
</div>

<script>
    function oynat(dosya) {
        const v = document.getElementById('v-player');
        const s = document.getElementById('status');
        
        // Önce temizle ve yükle
        v.style.display = "block";
        s.style.display = "none";
        
        // Dosya yolunu belirle
        v.src = dosya;
        v.load();
        
        // Oynatmayı dene
        v.play().catch(e => {
            v.style.display = "none";
            s.style.display = "block";
            s.innerHTML = "<b style='color:red'>HATA:</b><br>'" + dosya + "' dosyası bu klasörde bulunamadı!";
            console.error("Video hatası:", e);
        });
    }
</script>

</body>
</html>
